3pParseAllABPHideFiltersInfo=<p>Ez a beállítás engedélyezi az <a href="https://adblockplus.org/en/faq_internal#elemhide">Adblock Plus-típusú &ldquo;elemelrejtő&rdquo; szűrőket</a>. Ezek kizárólag kozmetikai célokat szolgálnak; elrejtik egy webhely azon elemeit, amelyek vizuálisan zavaróak, de a hálózati lekérések alapján nem szűrhetők ki.</p><p>A beállítás engedélyezése megnöveli a <i>uBlock₀</i> memóriahasználatát.</p>
