3pParseAllABPHideFiltersPrompt1=要素隠蔽フィルターを解析、施行する
3pParseAllABPHideFiltersInfo=<p>このオプションは<a href="https://adblockplus.org/en/faq_internal#elemhide">Adblock Plus適合の&ldquo;要素隠蔽&rdquo;フィルター</a>の解析と施行を有効にします。これらのフィルターは表面的で、ネットリクエストベースのフィルタリングエンジンでブロックできない視覚的に迷惑な要素をウェブページ上で隠す物です。</p><p>この機能を有効にするとuBlock₀の使用メモリーを増やします。</p>
3pIgnoreGenericCosmeticFilters=汎用的な要素隠蔽フィルターを無視する
3pIgnoreGenericCosmeticFiltersInfo=<p>汎用的な要素隠蔽フィルターとは、すべてのウェブサイトに適用される要素隠蔽フィルターのことです。<p>これはuBlock₀によって効率的に処理されますが、特に大規模で長期運営されている一部のウェブページ上では、メモリ使用量や処理時間に目に見える影響を与えることがあります。<p>このオプションを有効にすると、汎用的な要素隠蔽フィルターを処理するためにウェブページごとに追加されるメモリ使用量や処理時間を減らし、さらにuBlock₀自体のメモリ使用量を軽減できます。<p>低スペックの環境では、このオプションを有効にすることを推奨します。
