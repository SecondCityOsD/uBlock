3pParseAllABPHideFiltersInfo=<p>Tämä asetus ottaa käyttöön <a href="https://adblockplus.org/en/faq_internal#elemhide">Adblock Plus-yhteensopivat &ldquo;elementtejä piilottavat&rdquo; suodattimet</a>. Nämä suodattimet ovat pääasiassa ehosteita. Ne piilottavat verkkosivuilta elementtejä, jotka ovat visuaalisesti häiritseviä eikä niitä voi estää verkkopyyntöihin pohjautuvalla suodatinmoottorilla. </p><p>Tämä ominaisuus nostaa <i>uBlock₀</i>in muistinkäyttöä.</p>
3pIgnoreGenericCosmeticFilters=Jätä huomioitta geneeriset kosmeettiset suodattimet
3pIgnoreGenericCosmeticFiltersInfo=<p>Yleisten kosmeettisten suodattimien on tarkoitus päteä kaikkiin sivustoihin.<p>Vaikka uBlock₀ käsittelee ne tehokkaasti, voivat ne silti lisätä muisti- ja CPU-ylikuormitusta joillakin sivuilla, erityisesti suurilla ja pitkäikäisillä sivuilla.<p>Tämän valinnan salliminen karsii pois web-sivuille lisätyn muisti- ja CPU-ylikuormituksen joka aiheutuu yleisten kosmeettisten suotimien käsittelystä ja alentaa myös uBlock₀ sovelluksen muistijalanjälkeä.<p>On suositeltavaa sallia tämä vaihtoehto vähemmän tehokkailla laitteilla.
