3pParseAllABPHideFiltersInfo=<p>Šī opcija iespējo apstrādāt un ieviest ar <a href="https://adblockplus.org/en/faq_internal#elemhide"> Adblock Plus saderīgus &ldquo;elementu paslēpšanas&rdquo;</a> filtrus. Šie filtri ir būtībā kosmētiski, tie kalpo, lai paslēptu tīmekļa lapu elementus, kas tiek uzskatīti par vizuālu traucējumu, un kas nevar būt nobloķēti ar pieprasījumu balstītu filtrēšanas programmu.</p><p>Šī līdzekļa iespējošana palielina <i>uBlock₀</i> izmantojamās atmiņas daudzumu.</p>
