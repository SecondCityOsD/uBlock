3pParseAllABPHideFiltersInfo=<p>Настройката разрешава синтактично обособяване и налагане на <a href="https://adblockplus.org/en/faq_internal#elemhide"> съвместими с Adblock Plus филтри за &ldquo;скриване на елементи&rdquo;</a>. Козметични по същество, филтрите скриват визуално неприятни елементи в страницата, които иначе не се блокират от системата за филтриране по мрежова заявка.</p><p>Разрешаването ѝ ще увеличи ползваната от uBlock₀ памет.</p>
3pIgnoreGenericCosmeticFilters=Игнориране на общите козметични филтри
3pIgnoreGenericCosmeticFiltersInfo=<p>Общокозметични са филтрите, предназначени за прилагане във всички сайтове.<p>И макар че се ползват ефективно в uBlock₀, те могат съществено да увеличат натоварването на паметта и процесора в определени страници, особено в такива обемисти и дългозареждащи се.<p>Разрешаването ѝ ще премахне натоварването им в тях, поради начина на боравене с общокозметични филтри, както и ще намали ползваната от uBlock₀ памет.<p>Ползването на настройката се препоръчва при по-слаби устройства.
