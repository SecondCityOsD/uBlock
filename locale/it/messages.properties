3pParseAllABPHideFiltersInfo=<p>Questa opzione abilita i filtri di <a href="https://adblockplus.org/en/faq_internal#elemhide">Adblock Plus-compatible &ldquo;element hiding&rdquo; filters</a>. Questi filtri sono essenzialmente estetici, servono a nascondere elementi fastidiosi in una pagina web, e che non possono essere bloccati normalmente.</p><p>Questa funzione aumenta l'uso della memoria da parte di <i>uBlock</i>.</p>
3pIgnoreGenericCosmeticFilters=Ignora filtri cosmetici generici.
3pIgnoreGenericCosmeticFiltersInfo=<p>I filtri cosmetici generici sono i filtri cosmetici intesi per essere applicati a tutti i siti Web.<p>Benché questi siano gestiti in modo efficiente da uBlock₀, i filtri cosmetici generici potrebbero contribuire a un carico elevato in termini di memoria e CPU su alcune pagine Web, in particolare quelle di notevoli dimensioni e a lunga scadenza.<p>L'attivazione di quest'opzione eliminerà il carico elevato in termini di memoria e CPU aggiunto alle pagine Web in conseguenza della gestione dei filtri cosmetici generici, e inoltre ridurrà l'impatto sulla memoria di uBlock₀ stesso.<p>È raccomandato abilitare quest'opzione sui dispositivi meno potenti.
