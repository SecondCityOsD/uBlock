3pParseAllABPHideFiltersInfo=<p>هذا الخيار يمكّن من تحليل و تطبيق <a href="https://adblockplus.org/en/faq_internal#elemhide">فلاتر متطابقة مع فلاتر &rdquo;إخفاء العناصر&ldquo; لتطبيق آدبلوك بلس</a>. هذه الفلاتر جماليّة بالأساس، تهدف إلى إخفاء عناصر في صفحة الواب، و اللتي تعتبر إزعاجا بصريّا، قد لا يتمكّن محرّك فلاتر الرّوابط من كشفها و صدّها.</p><p>تفعيل هذا الخيار من شأنه زيادة أثر الذّاكرة uBlock₀</p>
