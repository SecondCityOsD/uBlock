3pIgnoreGenericCosmeticFiltersInfo=<p>الفلاتر التجميلية العمومية هي الفلاتر التجميلية التي تنطبق على كل مواقع الإنترنت.<p>رغم أن uBlock₀ يتعامل معها بكفاءة، تستطيع الفلاتر التجميلية العمومية أن تستهلك كمية لا بأس بها من الذاكرة و قوة المعالجة على بعض الصفحات، خاصّةً الصفحات الكبيرة أو ذات العمر الطويل.<p>تفعيل هذه الخاصية سيلغي استهلاك الذاكرة و قوة المعالجة المضافان على صفحات الإنترنت الناتجان عن التعامل مع الفلاتر التجميلية العمومية، بالإضافة إلى تقليل استهلاك الذاكرة من uBlock₀ بشكلٍ عام.<p>من الأفضل أن تُفَعَّل هذه الخاصية في الأجهزة الأقل كفاءة.
