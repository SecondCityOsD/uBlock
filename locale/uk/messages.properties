3pParseAllABPHideFiltersInfo=<p> Ця опція вмикає розбір та задіяння <a href="https://adblockplus.org/en/faq_internal#elemhide">Adblock Plus-сумісних &ldquo;element hiding&rdquo; фільтрів</a>. Ці фільтри є фактично косметичними – дозволяють приховати елементи в інтернеті, які є візуальними незручностями і які підходять для рушія блокування запитів.</p><p>Увімкнення цієї функції збільшує споживання пам’яті <i>µBlock</i>'ом.</p>
