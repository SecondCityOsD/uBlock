3pParseAllABPHideFiltersInfo=<p>此选项将启用<a href="https://adblockplus.org/zh_CN/faq_internal#elemhide">与 Adblock Plus 兼容的&ldquo;元素隐藏&rdquo;规则的解析和应用</a>。这些过滤规则本质上只是装饰美化，它们用来隐藏一个网页上被认为碍眼且不能被网络请求过滤引擎所屏蔽的视觉元素。</p><p>启用这项功能将增加 <i>uBlock₀</i> 的内存使用量。</p>
3pIgnoreGenericCosmeticFilters=忽略通用元素过滤规则。
3pIgnoreGenericCosmeticFiltersInfo=<p>通用元素过滤规则是应用到所有网站的元素过滤规则。<p>尽管 uBlock₀ 能很有效率地处理，通用元素过滤规则在一些网页上仍可能导致可见的内存和 CPU 占用增长，尤其是大和长期的内容。<p>启用此选项将解除这些添加到网页以处理通用元素过滤规则导致的内存和 CPU 占用，同时降低 uBlock₀ 本身的内存占用。<p>推荐低性能设备启用此选项。
