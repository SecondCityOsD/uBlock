3pParseAllABPHideFiltersPrompt1=Razčleni in uveljavi kozmetične filtre.
3pParseAllABPHideFiltersInfo=<p>Ta opcija omogoči razčlenjevanje in uveljavljanje <a href="https://adblockplus.org/en/faq_internal#elemhide"> Adblock Plus kompatibilnih filtrov za &ldquo;skrivanje elementov&rdquo;</a> Le-ti filtri so v bistvu kozmetični in služijo skrivanju elementov na spletnih straneh, ki jih lahko obravnavamo kot "vizualna nadloga", in taki, ki se jih preko filtrov zahtev omrežja ne da blokirati.</p>\n<p>Vklop te funkcije poveča spominski odtis uBlock₀.</p>
3pIgnoreGenericCosmeticFilters=Ignoriraj generične kozmetične filtre
3pIgnoreGenericCosmeticFiltersInfo=<p>Generični vizualni filtri so vizualni filtri, ki naj bi bili uporabljeni na vseh spletnih straneh.<p>Kljub temu, da je njihova uporaba v uBlock₀ učinkovita, generični vizualni filtri lahko, na nekaterih spletnih straneh (še posebno na velikih in starih), pripomorejo k opazni dodatni porabi pomnilnika in uporabi CPE.<p>Omogočitev te funkcije bo zmanjšala porabo pomnilnika in uporabo CPE, ki nastane kot rezultat dodajanja generičnih vizualnih filtrov, in tudi zmanjšala porabo pomnilnika dodatka uBlock₀.<p>Priporočeno je, da omogočite to možnost na manj zmogljivih napravah.
