<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" type="text/css" href="css/themes/default.css">
<link rel="stylesheet" type="text/css" href="css/common.css">
<link rel="stylesheet" type="text/css" href="css/logger-ui.css">
<link rel="stylesheet" type="text/css" href="css/logger-ui-inspector.css">
<link rel="icon" type="image/png" href="img/icon_16.png">
<title data-i18n="statsPageName"></title>
</head>
<body>

<!-- Top toolbar: page selector + inspector toggles -->
<div class="permatoolbar">
    <div class="toolbar-row">
        <div class="toolbar-left">
            <select id="pageSelector">
                <option value="" data-i18n="logAll">
                <option value="tab_bts" data-i18n="logBehindTheScene">
                <option value="tab_active" data-i18n="loggerCurrentTab">
            </select>
            <span id="refresh" class="button fa disabled needtab">&#xf021;</span>
            <span id="showdom" class="button fa">&#xf121;</span>
        </div>
        <div class="toolbar-center">
            <span id="filterButton" class="button fa">&#xf0b0;</span>
            <input id="filterInput" type="search" placeholder="filter log entries">
            <div id="filterExprPicker">
                <span class="preset-pill" data-expr="|--" title="Blocked requests">blocked</span>
                <span class="preset-pill" data-expr="|++" title="Allowed requests">allowed</span>
                <span class="preset-pill" data-expr="|<<" title="Redirected/modified">modified</span>
                <span class="sep"></span>
                <span class="preset-pill" data-expr="script" title="Scripts">script</span>
                <span class="preset-pill" data-expr="xhr" title="XHR requests">xhr</span>
                <span class="preset-pill" data-expr="image" title="Images">image</span>
                <span class="preset-pill" data-expr="css" title="Stylesheets">css</span>
                <span class="preset-pill" data-expr="frame" title="Frames">frame</span>
                <span class="preset-pill" data-expr="other" title="Other types">other</span>
                <span class="sep"></span>
                <span class="preset-pill" data-expr="error" title="Errors only">errors</span>
            </div>
        </div>
        <div class="toolbar-right">
            <span id="pauseLog" class="button fa" title="Pause/Resume (Space)">&#xf04c;</span>
            <span id="exportLog" class="button fa" title="Copy to clipboard (Ctrl+E)">&#xf0c5;</span>
            <input id="maxEntries" type="text" size="5" title="logMaxEntriesTip">
        </div>
    </div>
</div>

<div id="inspectors">
    <div id="domInspector" class="inspector vCompact hCompact">
        <div class="permatoolbar">
            <div>
                <span class="button fa vCompactToggler"></span>
                <span class="button fa hCompactToggler"></span>
                <span class="button fa highlightMode" style="display: none">&#xf042;</span>
                <span class="button fa revert disabled">&#xf12d;</span>
                <span class="button fa commit disabled">&#xf0c7;</span>
            </div>
        </div>
        <div class="vscrollable">
            <ul id="domTree"></ul>
        </div>
    </div>

    <div id="netInspector" class="inspector vCompact f">
        <div class="permatoolbar net-toolbar">
            <div>
                <span class="button fa vCompactToggler"></span>
                <span id="clean" class="button fa disabled">&#xf00d;</span>
                <span id="clear" class="button fa disabled">&#xf12d;</span>
            </div>
        </div>
        <div class="vscrollable">
            <style id="tabFilterer"></style>
            <style id="popupFilterer"></style>
            <table>
                <colgroup><col><col><col><col><col><col></colgroup>
                <thead>
                    <tr>
                        <th class="col-time">Time</th>
                        <th class="col-filter">Filter</th>
                        <th class="col-result"></th>
                        <th class="col-type">Type</th>
                        <th class="col-party">Party</th>
                        <th class="col-url">URL</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <div id="popupContainer">
                <div><span>&#xf068;</span>&ensp;<span>&#xf00d;</span></div>
            </div>
        </div>
    </div>
</div>

<div id="templates" style="display: none;">
    <div id="renderedURLTemplate"><span><span></span><b></b><span></span></span></div>
    <div id="hiddenTemplate"><span style="display:none;"></span></div>
    <div id="netFilteringDialog" class="modalDialog">
        <div class="dialog">
            <div class="hide preview"></div>
            <div class="headers">
                <span class="header dynamic selected" data-container="dynamic" data-i18n="loggerURLFilteringHeader"></span>
                <span class="header static" data-container="static" data-i18n="loggerStaticFilteringHeader"></span>
                <span class="tools"><span class="fa reload">&#xf021;</span>&emsp;<span class="fa picker">&#xf1fb;</span></span>
            </div>
            <div class="containers">
                <div class="container dynamic selected">
                    <table class="toolbar">
                        <colgroup><col><col></colgroup>
                        <tbody>
                        <tr>
                            <td><span id="saveRules" class="fa">&#xf023;</span>
                            <td><p>
                                <label><span data-i18n="loggerURLFilteringContextLabel"></span> <select class="dynamic origin"></select></label>&emsp;
                                <label><span data-i18n="loggerURLFilteringTypeLabel"></span> <select class="dynamic type"><option><option value="*">*</select></label>
                                </p>
                        <tr class="entry">
                            <td><div class="action"><span class="allow">&nbsp;</span><span class="noop">&nbsp;</span><span class="block">&nbsp;</span></div>
                            <td class="url">
                        </tbody>
                    </table>
                    <table class="entries">
                        <colgroup><col><col></colgroup>
                        <tbody></tbody>
                    </table>
                </div>
                <div class="container static">
                    <p></p>
                    <p><textarea class="staticFilter" value=""></textarea>
                       <button id="createStaticFilter" class="important" type="button" data-i18n="pickerCreate"></button>
                   </p>
                </div>
            </div>
        </div>
    </div>
    <div id="filterFinderDialog" class="modalDialog">
        <div class="dialog"></div>
    </div>
    <ul id="filterFinderListEntry">
        <li class="filterFinderListEntry">
            <a href="asset-viewer.html?url=" target="_blank"></a>
            <a href="" class="fa" target="_blank">&#xf015;</span></li>
    </ul>
    <div id="cosmeticFilteringDialog" class="modalDialog">
        <div class="dialog">
            <textarea class="cosmeticFilters" value=""></textarea>
            <button id="createCosmeticFilters" class="important" type="button" data-i18n="pickerCreate"></button>
        </div>
    </div>
</div>

<script src="js/vapi.js"></script>
<script src="js/vapi-common.js"></script>
<script src="js/vapi-client.js"></script>
<script src="js/udom.js"></script>
<script src="js/i18n.js"></script>
<script src="js/logger-ui.js"></script>
<script src="js/logger-ui-inspector.js"></script>

</body>
</html>
